[opener]
edit = [
    { run = 'nvim "$@"', block = true },
]
open = [
    { run = 'xdg-open "$@"' },
]
reveal = [
    { run = 'xdg-open "$(dirname "$1")"' },
]

[open]
rules = [
    # Text / code → nvim
    { mime = "text/*",                    use = "edit" },
    { mime = "application/json",          use = "edit" },
    { mime = "application/toml",          use = "edit" },
    { mime = "application/xml",           use = "edit" },
    { mime = "inode/x-empty",             use = "edit" },

    # Everything else → xdg-open
    { mime = "*",                          use = "open" },
]
