shell /usr/bin/zsh
font_family      Hack Nerd Font Mono
font_size        12.0

# Rose Pine
background            #191724
foreground            #e0def4
selection_background  #403d52
selection_foreground  #e0def4
cursor                #e0def4
cursor_text_color     #191724
url_color             #9ccfd8

# Black
color0  #26233a
color8  #6e6a86
# Red
color1  #eb6f92
color9  #eb6f92
# Green
color2  #31748f
color10 #31748f
# Yellow
color3  #f6c177
color11 #f6c177
# Blue
color4  #9ccfd8
color12 #9ccfd8
# Magenta
color5  #c4a7e7
color13 #c4a7e7
# Cyan
color6  #ebbcba
color14 #ebbcba
# White
color7  #e0def4
color15 #e0def4

# True color + italic support
term             xterm-kitty

# Yazi image previews
allow_remote_control yes
shell_integration enabled no-cursor

# Cursor
cursor_shape           block
cursor_blink_interval  0

# Scrollback
scrollback_lines 10000

# Window
window_padding_width 8
hide_window_decorations yes

# Bell
enable_audio_bell no
